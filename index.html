<!DOCTYPE html>
<html>
<head>
  <title>My Food</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .sidebar {
      width: 200px;
      height: 100vh;
      background: black;
      position: fixed;
      padding: 20px;
    }

    .sidebar a {
      color: white;
      display: block;
      margin: 10px 0;
      text-decoration: none;
    }

    .sidebar a:hover {
      background: gray;
      padding: 5px;
    }

    .content {
      margin-left: 220px;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h3 {
      padding: 10px;
    }
  </style>

</head>
<body>

<div class="sidebar">
  <a href="#">Home</a>
  <a href="#">Food</a>
  <a href="#">About</a>
</div>

<div class="content">
  <h1>My Food 🍔</h1>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">
      <h3>Burger</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
      <h3>Salad</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
      <h3>Steak</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1523987355523-c7b5b0723c3b">
      <h3>Pasta</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061">
      <h3>Breakfast</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1514516870926-2059897f0c42">
      <h3>Dessert</h3>
    </div>

  </div>
</div>

</body>
</html>
